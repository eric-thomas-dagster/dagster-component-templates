type: dagster_component_templates.LiteLLMInferenceAssetComponent
attributes:
  asset_name: enriched_support_tickets
  upstream_asset_key: raw_support_tickets

  # LiteLLM routes to 100+ providers via the same component — change the
  # model + api_key_env_var to switch:
  #   model: gpt-4o-mini                          api_key_env_var: OPENAI_API_KEY
  #   model: gemini/gemini-2.5-flash              api_key_env_var: GEMINI_API_KEY
  #   model: claude-haiku-4-5-20251001            api_key_env_var: ANTHROPIC_API_KEY
  #   model: groq/llama-3.3-70b-versatile         api_key_env_var: GROQ_API_KEY
  #   model: openrouter/anthropic/claude-3.5-sonnet  api_key_env_var: OPENROUTER_API_KEY
  model: claude-haiku-4-5-20251001
  api_key_env_var: ANTHROPIC_API_KEY

  prompt_template: "Classify the sentiment and urgency of this support ticket in JSON: {body}"
  system_prompt: 'You are a support ticket classifier. Respond with JSON only: {"sentiment": "positive|neutral|negative", "urgency": "low|medium|high"}'

  response_column: ai_classification

  temperature: 0.0
  max_tokens: 256
  batch_size: 10
  group_name: ai
