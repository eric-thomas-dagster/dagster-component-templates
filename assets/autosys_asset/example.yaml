# REST API example — Finance ETL jobs (AutoSys v12+)
type: dagster_component_templates.AutoSysAssetComponent
attributes:
  host: autosys.internal.company.com
  port: 9443
  username_env_var: AUTOSYS_USER
  password_env_var: AUTOSYS_PASSWORD
  job_filter: "FINANCE_ETL_*"
  expand_box_jobs: true
  box_completion_asset: true
  map_conditions: true
  group_name: autosys_finance
  poll_interval_seconds: 30
  job_timeout_seconds: 7200
  # Optional: override AssetSpec for specific AutoSys jobs
  assets_by_job_name:
    FINANCE_ETL_LOAD_ORDERS:
      key: finance/orders_loaded
      description: "Orders loaded from source system by AutoSys"
      group_name: finance
      metadata:
        owner: finance-team
        sla_hours: "4"
      deps:
        - raw/orders_extract
    FINANCE_ETL_EXPORT:
      - key: finance/orders_export_us
        description: "US orders export"
      - key: finance/orders_export_eu
        description: "EU orders export"

