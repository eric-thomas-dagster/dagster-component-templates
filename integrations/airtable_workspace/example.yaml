type: dagster_community_components.AirtableWorkspaceComponent
attributes:
  pat_env_var: AIRTABLE_PAT              # Personal Access Token from airtable.com/create/tokens

  table_selector:
    by_pattern: ["*.Orders", "*.Customers"]        # qualified as BaseName.TableName
    # by_name: [MyBase.Orders]                     # exact matches also OK
    # exclude_by_pattern: ["*.Archive*"]

  page_size: 100
  group_name: airtable_data
  asset_key_prefix: [airtable]

  defs_state:
    management_type: LOCAL_FILESYSTEM
    refresh_if_dev: true
