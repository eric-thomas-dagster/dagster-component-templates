# Minimal configuration — discovers all Glue jobs in us-east-1.
# Run `dg utils refresh-defs-state` after adding to populate the cache.
type: dagster_component_templates.AWSGlueComponent
attributes:
  region_name: us-east-1
  aws_access_key_id: "{{ env('AWS_ACCESS_KEY_ID') }}"
  aws_secret_access_key: "{{ env('AWS_SECRET_ACCESS_KEY') }}"
  import_jobs: true
  import_catalog_tables: true
  catalog_database_filter: production,analytics
  group_name: aws_glue_prod

---
# Advanced configuration — all entity types with prefix filtering and state caching.
type: dagster_component_templates.AWSGlueComponent
attributes:
  region_name: us-east-1
  aws_access_key_id: "{{ env('AWS_ACCESS_KEY_ID') }}"
  aws_secret_access_key: "{{ env('AWS_SECRET_ACCESS_KEY') }}"

  # Entity discovery
  import_jobs: true
  import_crawlers: true
  import_workflows: true
  import_databrew_jobs: true
  import_data_quality_rulesets: true

  # Lineage tracking
  import_catalog_tables: true
  catalog_database_filter: production,staging,analytics

  # Filtering — only jobs whose names start with "prod_", excluding "test"/"dev"
  job_name_prefix: prod_
  exclude_name_pattern: test|dev
  filter_by_tags: environment,team

  # Asset presentation
  group_name: aws_glue_workspace
  key_prefix: glue

  # Observation sensor
  generate_sensor: true
  poll_interval_seconds: 60

  # Optional: override AssetSpec for specific Glue jobs
  assets_by_job_name:
    etl-orders-prod:
      key: raw/orders
      description: "Raw orders loaded by Glue ETL"
      group_name: raw
      metadata:
        owner: data-engineering
        sla_hours: "4"
      tags:
        dagster/storage_kind: s3
    customer-export-job:
      - key: exports/customers_us
        description: "US customer export"
      - key: exports/customers_eu
        description: "EU customer export"
