# Basic configuration — imports only pipelines (recommended starting point)
type: dagster_component_templates.AzureDataFactoryComponent
attributes:
  subscription_id: "12345678-1234-1234-1234-123456789012"
  resource_group_name: my-resource-group
  factory_name: my-data-factory
  tenant_id: "{{ env('AZURE_TENANT_ID') }}"
  client_id: "{{ env('AZURE_CLIENT_ID') }}"
  client_secret: "{{ env('AZURE_CLIENT_SECRET') }}"
  import_pipelines: true
  group_name: adf_prod

---
# Advanced configuration — imports pipelines and triggers with filtering
type: dagster_component_templates.AzureDataFactoryComponent
attributes:
  subscription_id: "12345678-1234-1234-1234-123456789012"
  resource_group_name: my-resource-group
  factory_name: my-data-factory
  tenant_id: "{{ env('AZURE_TENANT_ID') }}"
  client_id: "{{ env('AZURE_CLIENT_ID') }}"
  client_secret: "{{ env('AZURE_CLIENT_SECRET') }}"

  # Import entity types
  import_pipelines: true
  import_triggers: true

  # Filtering (optional)
  filter_by_name_pattern: ^prod_.*
  exclude_name_pattern: test|dev
  filter_by_tags: env,team

  # Sensor configuration
  generate_sensor: true
  poll_interval_seconds: 60

  group_name: adf_workspace
  description: Complete Azure Data Factory integration

  # StateBackedComponent cache location (optional — defaults to local filesystem)
  # defs_state:
  #   path: .dagster/adf_state

---
# Using DefaultAzureCredential (Managed Identity / Azure CLI — no explicit credentials)
type: dagster_component_templates.AzureDataFactoryComponent
attributes:
  subscription_id: "12345678-1234-1234-1234-123456789012"
  resource_group_name: my-resource-group
  factory_name: my-data-factory
  import_pipelines: true
  import_triggers: true
  group_name: adf_managed_identity

---
# Optional: override AssetSpec for specific ADF pipelines
type: dagster_component_templates.AzureDataFactoryComponent
attributes:
  subscription_id: "12345678-1234-1234-1234-123456789012"
  resource_group_name: my-resource-group
  factory_name: my-data-factory
  import_pipelines: true
  group_name: adf_prod
  assets_by_pipeline_name:
    CopyCustomerData:
      key: raw/customers
      description: "Customer data copied by ADF"
      group_name: raw
      metadata:
        owner: platform-team
    DailyAggregationPipeline:
      - key: marts/daily_revenue
        description: "Daily revenue aggregation"
      - key: marts/daily_users
        description: "Daily active users"
