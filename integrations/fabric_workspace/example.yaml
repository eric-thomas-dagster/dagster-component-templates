type: dagster_component_templates.FabricWorkspaceComponent
attributes:
  workspace_id: "12345678-1234-1234-1234-123456789012"

  # Auth — omit env vars in Azure compute (managed identity used automatically)
  tenant_id_env_var: AZURE_TENANT_ID
  client_id_env_var: AZURE_CLIENT_ID
  client_secret_env_var: AZURE_CLIENT_SECRET

  # Pick which item types to import as Dagster assets
  import_lakehouses: true        # → external assets
  import_warehouses: true        # → external assets
  import_pipelines: true         # → trigger assets (materialize to run)
  import_notebooks: false
  import_dataflows: false

  group_name: fabric
