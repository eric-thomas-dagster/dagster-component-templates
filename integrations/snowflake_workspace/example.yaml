# Basic configuration - imports only tasks
type: dagster_component_templates.SnowflakeWorkspaceComponent
attributes:
  account: xy12345.us-east-1
  user: dagster_user
  password: "{{ env('SNOWFLAKE_PASSWORD') }}"
  warehouse: COMPUTE_WH
  database: ANALYTICS
  schema: PUBLIC
  import_tasks: true
  import_stored_procedures: false
  import_dynamic_tables: false
  import_materialized_views: false
  import_streams: false
  import_snowpipes: false
  import_stages: false
  import_external_tables: false
  import_alerts: false
  import_openflow_flows: false
  group_name: snowflake_prod
  description: Production Snowflake tasks

---
# Advanced configuration - imports all entity types with filtering
type: dagster_component_templates.SnowflakeWorkspaceComponent
attributes:
  # Connection details
  account: xy12345.us-east-1
  user: dagster_user
  password: "{{ env('SNOWFLAKE_PASSWORD') }}"
  warehouse: COMPUTE_WH
  database: ANALYTICS
  schema: PUBLIC
  role: ACCOUNTADMIN

  # Import all entity types (10 total!)
  import_tasks: true
  import_stored_procedures: true
  import_dynamic_tables: true
  import_materialized_views: true
  import_streams: true
  import_snowpipes: true
  import_stages: true
  import_external_tables: true
  import_alerts: true
  import_openflow_flows: true

  # Filter configuration
  filter_by_name_pattern: ^PROD_.*
  exclude_name_pattern: TEST|DEV|STAGING
  task_filter_by_state: STARTED

  # Sensor configuration
  generate_sensor: true
  poll_interval_seconds: 60

  # Organization
  group_name: snowflake_workspace
  description: Complete Snowflake workspace import with all entity types

  # Optional per-entity AssetSpec overrides — mirrors the official
  # DatabricksWorkspaceComponent.assets_by_task_key. Filters above still
  # apply; assets_by_name only customizes entities you specifically name.
  # Anything not listed here uses default key/group/metadata.
  assets_by_name:
    CUSTOMER_METRICS:                       # the Snowflake Dynamic Table name
      key: silver/customer_metrics          # → AssetKey(["silver", "customer_metrics"])
      group_name: silver
      description: Per-customer lifetime metrics, refreshed hourly
      deps:                                 # cross-engine / cross-component lineage
        - raw/orders
        - raw/customers
      metadata:
        domain: analytics
        owner: data-platform
      tags:
        tier: gold
