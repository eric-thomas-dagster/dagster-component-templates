# yaml-language-server: $schema=https://raw.githubusercontent.com/eric-thomas-dagster/dagster-component-templates/main/jobs/openlineage_export_job/schema.json
type: dagster_component_templates.OpenLineageExportJobComponent
attributes:
  job_name: emit_openlineage_run_events
  schedule: "*/15 * * * *"           # every 15 minutes
  default_status: STOPPED
  endpoint_env_var: OPENLINEAGE_URL  # e.g. http://marquez:5000/api/v1/lineage
  namespace: dagster.prod
  ol_job_name: nightly_pipeline
  producer: https://github.com/eric-thomas-dagster/dagster-component-templates/openlineage_export_job
  fail_on_collector_error: false     # best-effort emit
  tags:
    team: platform
