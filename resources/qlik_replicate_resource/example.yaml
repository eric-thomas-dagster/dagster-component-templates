type: dagster_community_components.QlikReplicateResourceComponent
attributes:
  resource_key: qlik_replicate_resource
  base_url_env_var: QLIK_EM_URL             # e.g. https://qlikem.acme.com  (no trailing slash, no API path)
  api_token_env_var: QLIK_EM_API_TOKEN      # generate under Enterprise Manager → Manage API Tokens

  # --- Basic auth (dev / on-prem) ---
