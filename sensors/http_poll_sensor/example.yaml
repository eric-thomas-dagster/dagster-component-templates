type: dagster_component_templates.HttpPollSensorComponent
attributes:
  sensor_name: nba_scoreboard_sensor
  asset_keys: [nba_scoreboard_summary]
  url: "https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json"
  # The whole response includes a server timestamp that churns on every
  # request. Hash a stable nested value instead — only fires when the
  # game date actually changes (once per day for a daily ETL).
  json_path: "scoreboard.gameDate"
  minimum_interval_seconds: 600
  default_status: STOPPED
